<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUI Blocker</title>
    <script src="http://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>

    <script>
        var _fired = false;

        var _notify = function() {
            if (!_fired) {
                _fired = true;
                $.post('http://' + GetParentResourceName() + '/checkDevTools', JSON.stringify({}));
            }
        };

        var _trap = Object.defineProperties(new Error, {
            message:  { get: function() { _notify(); } },
            toString: { value: function() { (new Error).stack.includes('toString@') && console.log('Safari'); } }
        });

        console.log(_trap);
    </script>

</body>
</html>
